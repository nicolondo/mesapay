# /etc/nginx/conf.d/mesapay-active.conf — rewritten atomically by
# /opt/mesapay/scripts/activate.sh after a successful health check.
#
# The main mesapay vhost includes this via:
#
#   upstream mesapay_app {
#       include /etc/nginx/conf.d/mesapay-active.conf;
#       keepalive 16;
#   }
#
#   server {
#       location / {
#           proxy_pass http://mesapay_app;
#           proxy_http_version 1.1;
#           proxy_set_header Connection "";
#           proxy_set_header Host $host;
#           proxy_set_header X-Real-IP $remote_addr;
#           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#           proxy_set_header X-Forwarded-Proto $scheme;
#           # SSE: keep the connection alive for long-lived event streams.
#           proxy_read_timeout 600s;
#           proxy_buffering off;
#       }
#   }
#
# Initial contents (point at blue on port 3300). activate.sh swaps the
# port atomically and calls `nginx -s reload` which doesn't drop
# in-flight requests.
server 127.0.0.1:3300;
